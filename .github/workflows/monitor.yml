name: Planet IMAX monitor

on:
  push:
    branches:
      - master
  # schedule:
  #   # Check every 5 minutes, including exact hour boundaries
  #   - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      send_test:
        description: "Send Telegram sanity-check message only"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: planet-imax-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run unit tests
        run: PYTHONPATH="${GITHUB_WORKSPACE}" python -m pytest -q

      - name: Run monitor
        run: |
          ARGS=()

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.send_test }}" == "true" ]]; then
            ARGS+=(--send-test)
          fi

          printf 'Monitor arguments:'
          printf ' %q' "${ARGS[@]}"
          printf '\n'
          python monitor.py "${ARGS[@]}"

      - name: Commit updated monitor state
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.send_test == false }}
        run: |
          if git diff --quiet -- state.json; then
            echo "No state change."
            exit 0
          fi
          git config user.name "planet-imax-monitor[bot]"
          git config user.email "planet-imax-monitor[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "chore: update IMAX monitor state"
          git push
